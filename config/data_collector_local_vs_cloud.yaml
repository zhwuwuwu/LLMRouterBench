# Local vs Cloud Model Comparison Configuration
# Models: qwen3-coder-next (local-tier) vs qwen3.5-35b-a3b (cloud-tier)

models:
  # Local-tier model (code-specialized)
  - name: qwen3-coder-next
    api_model_name: qwen3-coder-next-80b-4bit-awq
    base_url: https://superrouter.intel.com/v1
    api_key: INTEL_SUPERROUTER_API_KEY
    temperature: 0.2
    top_p: 1.0
    timeout: 300
    pricing:
      prompt_price_per_million: 0.01  # Assumed local deployment cost
      completion_price_per_million: 0.01

  # Cloud-tier model (general-purpose)
  - name: qwen3.5-35b-a3b
    api_model_name: qwen3.5-35b-a3b-awq-4b
    base_url: https://superrouter.intel.com/v1
    api_key: INTEL_SUPERROUTER_API_KEY
    temperature: 0.2
    top_p: 1.0
    timeout: 600
    pricing:
      prompt_price_per_million: 0.50  # Assumed cloud API cost
      completion_price_per_million: 1.50

# Dataset Selection: Math (AIME, LiveMathBench), Code (LiveCodeBench), Knowledge (GPQA, MMLU-Pro)

datasets:
  # Math (AIME, LiveMathBench)
  - dataset_id: aime
    splits: ["hybrid"]
  - dataset_id: livemathbench
    splits: ["test"]

  # Code (LiveCodeBench)
  - dataset_id: livecodebench
    splits: ["test"]

  # Knowledge (GPQA, MMLU-Pro)
  - dataset_id: gpqa
    splits: ["test"]
  - dataset_id: mmlupro
    splits: ["test_3000"]

run:
  output_dir: ./results
  overwrite: false
  concurrency: 8
  log_level: INFO

cache:
  enabled: true
  force_override_cache: false
  mysql:
    host: MYSQL_HOST
    port: MYSQL_PORT
    user: MYSQL_USER
    password: MYSQL_PASSWORD
    database: local_vs_cloud_cache
    table_name: generator_output_cache
    charset: utf8mb4
    autocommit: true
    ttl_seconds: null

    use_connection_pool: false
    pool_size: 4
    max_overflow: 2
    pool_timeout: 10
    pool_recycle: 3600

  key_generator:
    cached_parameters: ["model", "temperature", "top_p", "messages"]
    hash_algorithm: blake2b
    hash_digest_size: 16

  conditions:
    cache_successful_only: true
    min_completion_tokens: 0

  log_level: INFO
  enable_stats: true
